<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apresentação: O Modelo Atômico de Thomson</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050a10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        #frame-container {
            width: 1280px;
            height: 720px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            background: #0d1b2a;
            overflow: hidden;
            border-radius: 8px;
            /* For an elegant touch without breaking slide alignment */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #0d1b2a;
        }

        #controls {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: rgba(13, 27, 42, 0.7);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 40px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 10;
            border: 1px solid rgba(240, 165, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s;
        }

        .btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #f0a500;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            transition: all 0.2s;
            outline: none;
        }

        .btn:hover:not(:disabled) {
            background: rgba(240, 165, 0, 0.2);
            border-color: #f0a500;
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
        }

        #counter {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            min-width: 50px;
            text-align: center;
        }
    </style>
</head>

<body>

            <button class="btn" id="btn-next" onclick="nextSlide()" title="Próximo Slide (Seta Direita / Espaço)"><i
                    class="fas fa-chevron-right"></i></button>
        </div>
    </div>

        const slides = slidesB64.map(b64 => decodeURIComponent(escape(window.atob(b64))));

        let currentSlide = 0;
        const frame = document.getElementById('slide-frame');
        const counter = document.getElementById('counter');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function updateSlide() {
            frame.srcdoc = slides[currentSlide];
            counter.innerText = (currentSlide + 1) + " / " + slides.length;

            btnPrev.disabled = currentSlide === 0;
            btnNext.disabled = currentSlide === slides.length - 1;

            frame.onload = function () {
                try {
                    frame.contentWindow.focus();
                    frame.contentDocument.addEventListener('keydown', handleKey);
                } catch (e) { }
            };
        }

        function handleKey(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                nextSlide();
                e.preventDefault();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
                e.preventDefault();
            }
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                updateSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlide();
            }
        }

        document.addEventListener('keydown', handleKey);
        window.onload = updateSlide;
    </script>
